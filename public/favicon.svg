<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#185fa5"/>

  <!-- Trigger event circle -->
  <circle cx="16" cy="7.5" r="2.8" fill="white"/>

  <!-- Connector: stem down, branch left and right -->
  <path d="M16 10.3 V13.2 H10 V16.5 M16 13.2 H22 V16.5"
        stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left job box -->
  <rect x="5.5" y="16.5" width="9" height="8" rx="2" fill="white"/>

  <!-- Right job box -->
  <rect x="17.5" y="16.5" width="9" height="8" rx="2" fill="white"/>

  <!-- Left job: play triangle -->
  <polygon points="8,19 8,23 12,21" fill="#185fa5"/>

  <!-- Right job: three step dots -->
  <circle cx="19.8" cy="21" r="1.1" fill="#185fa5"/>
  <circle cx="22.5" cy="21" r="1.1" fill="#185fa5"/>
  <circle cx="25.2" cy="21" r="1.1" fill="#185fa5"/>
</svg>
